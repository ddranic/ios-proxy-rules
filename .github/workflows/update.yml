name: Update Proxy Rules

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Download source data
        run: |
          curl -fsSL https://github.com/v2fly/domain-list-community/releases/latest/download/dlc.dat -o dlc.dat
          curl -fsSL https://github.com/v2fly/geoip/releases/latest/download/geoip.dat -o geoip.dat

      - name: Generate rules
        run: go run ./cmd/rulegen -geosite dlc.dat -geoip geoip.dat

      - name: Install sing-box
        run: curl -fsSL https://sing-box.app/install.sh | sh

      - name: Compile sing-box rule-sets
        run: |
          find geosite/singbox geoip/singbox -name "*.json" | xargs -P4 -I{} sh -c 'sing-box rule-set compile "$1" && rm "$1"' _ {}

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A geosite geoip
          if git diff --cached --quiet; then
            echo "No changes detected"
            exit 0
          fi
          git commit -m "Auto-update: $(date +'%Y-%m-%d %H:%M')"
          git push
  
